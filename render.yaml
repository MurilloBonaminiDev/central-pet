# Render Blueprint — API Central Pet
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: central-pet-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: REDIS_URL
        value: memory://
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
